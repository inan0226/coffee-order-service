services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: coffee_order_service
      POSTGRES_USER: coffee
      POSTGRES_PASSWORD: coffee
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coffee -d coffee_order_service"]
      interval: 5s
      timeout: 3s
      retries: 10
