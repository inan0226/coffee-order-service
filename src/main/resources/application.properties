spring.application.name=coffee-order-service
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/coffee_order_service}
spring.datasource.username=${DB_USERNAME:coffee}
spring.datasource.password=${DB_PASSWORD:coffee}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.task.scheduling.pool.size=${SCHEDULER_POOL_SIZE:2}
